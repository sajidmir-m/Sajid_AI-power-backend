[alembic]
script_location = backend/migrations
# Alembic reads DATABASE_URL in backend/migrations/env.py.
# Keep this as a non-SQLite placeholder for local tooling; prefer env var.
sqlalchemy.url = postgresql+psycopg2://USER:PASSWORD@HOST:5432/DATABASE

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

